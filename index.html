<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에너지 세미나 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
  :root{--bg:#F7F8FA;--surface:#FFFFFF;--border:#E4E8EF;--text-1:#1A2332;--text-2:#4A5568;--text-3:#8A96A8;--blue:#2D6BE4;--blue-lt:#EBF1FD;--green:#1E8A4C;--green-lt:#E6F5ED;--amber:#B45309;--amber-lt:#FEF3DC;--purple:#6B46C1;--purple-lt:#F0EBFF}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-1);font-size:13px;line-height:1.6}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:10px}
  .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--blue)}
  .header-title{font-size:14px;font-weight:600;color:var(--text-1)}
  .header-sub{font-size:11px;color:var(--text-3);margin-left:8px}
  .updated{font-size:11px;color:var(--text-3)}
  .container{max-width:1100px;margin:0 auto;padding:24px}
  .month-tabs{display:flex;gap:6px;margin-bottom:20px}
  .mtab{font-size:12px;padding:5px 16px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text-2);transition:all .15s}
  .mtab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
  .metric-label{font-size:11px;color:var(--text-3);margin-bottom:6px;font-weight:500;letter-spacing:.3px}
  .metric-val{font-size:26px;font-weight:600;color:var(--text-1)}
  .metric-val.blue{color:var(--blue)}
  .metric-val.green{color:var(--green)}
  .filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
  .filter-sep{width:1px;height:16px;background:var(--border);margin:0 4px}
  .filter-label{font-size:11px;color:var(--text-3);font-weight:500}
  .pill{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text-2);transition:all .15s}
  .pill.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
  .section-title{font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin:28px 0 12px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .section-count{font-size:10px;background:var(--bg);border:1px solid var(--border);color:var(--text-3);padding:1px 7px;border-radius:10px;font-weight:500;text-transform:none;letter-spacing:0}
  .cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
  .cal-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-1);display:flex;justify-content:space-between;align-items:center}
  .cal-header-r{font-size:11px;color:var(--text-3);font-weight:400}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-dow{padding:8px 4px;text-align:center;font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.3px;border-bottom:1px solid var(--border);background:var(--bg)}
  .cal-cell{min-height:80px;padding:6px 5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .cal-cell:nth-child(7n){border-right:none}
  .cal-cell.empty{background:var(--bg);opacity:.5}
  .cal-cell.today .cal-day-num{background:var(--blue);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:600}
  .cal-day-num{font-size:11px;color:var(--text-2);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:500}
  .cal-event{font-size:9.5px;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.4;cursor:default;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev-high{background:var(--green-lt);color:var(--green)}
  .ev-med{background:var(--amber-lt);color:var(--amber)}
  .ev-low{background:var(--bg);color:var(--text-3);border:1px solid var(--border)}
  .cal-note{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
  .cal-note-header{padding:12px 18px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-2);background:var(--bg)}
  .cal-note-row{display:flex;align-items:center;gap:8px;padding:8px 18px;border-bottom:1px solid var(--border);font-size:11px}
  .cal-note-row:last-child{border-bottom:none}
  .cal-note-name{color:var(--text-1);flex:1;font-weight:500}
  .cal-note-date{color:var(--text-3);font-size:10px;flex-shrink:0}
  .badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0}
  .b-conf{background:var(--blue-lt);color:var(--blue)}
  .b-plan{background:var(--amber-lt);color:var(--amber)}
  .b-est{background:var(--purple-lt);color:var(--purple)}
  .b-high{background:var(--green-lt);color:var(--green)}
  .b-med{background:var(--amber-lt);color:var(--amber)}
  .b-low{background:var(--bg);color:var(--text-3);border:1px solid var(--border)}
  .card-list{display:flex;flex-direction:column;gap:8px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .15s,box-shadow .15s}
  .card:hover{border-color:#C0CCE0;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
  .card-title{font-size:13px;font-weight:600;color:var(--text-1);line-height:1.4}
  .card-badges{display:flex;gap:4px;flex-shrink:0}
  .card-meta{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;margin-bottom:8px}
  .meta-row{display:flex;gap:6px;font-size:11px}
  .meta-key{color:var(--text-3);font-weight:500;flex-shrink:0;width:24px}
  .meta-val{color:var(--text-2)}
  .card-divider{height:1px;background:var(--border);margin:8px 0}
  .card-content{font-size:11px;color:var(--text-2);line-height:1.7}
  .card-speakers{font-size:11px;color:var(--text-2);margin-top:4px}
  .card-speakers b{color:var(--text-1)}
  .card-source{font-size:10px;margin-top:6px}
  .card-source a{color:var(--blue);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s}
  .card-source a:hover{border-bottom-color:var(--blue)}
  .empty{text-align:center;padding:40px;color:var(--text-3);font-size:13px}
  .footer{text-align:center;padding:32px 0 24px;font-size:11px;color:var(--text-3);border-top:1px solid var(--border);margin-top:40px}
  .monitor-links{display:flex;gap:16px;justify-content:center;margin-top:8px;flex-wrap:wrap}
  .monitor-links a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">

  <div class="section-title">캘린더</div>
  <div class="cal-wrap">

    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="cal-note">

    <div id="note-body"></div>
  </div>
  <div class="section-title">행사 목록 <span class="section-count" id="list-count"></span></div>
  <div class="card-list" id="card-list"></div>
  <footer class="footer">
    <div>개최추정 행사는 반드시 직접 확인 후 참석 결정하세요.</div>

  </footer>
</div>

const BS={일정확정:'b-conf',일정조율중:'b-plan',개최추정:'b-est'};
const BP={최우선:'b-high',우선:'b-med',참고용:'b-low'};
const EP={최우선:'ev-high',우선:'ev-med',참고용:'ev-low'};
let curM=7,fPrio='all',fStatus='all';

function allData(){return curM===6?D6:D7;}
function filtered(){return allData().filter(d=>(fPrio==='all'||d.prio===fPrio)&&(fStatus==='all'||d.status===fStatus));}

document.getElementById('updated-date').textContent='업데이트: '+new Date().toLocaleDateString('ko-KR');

document.querySelectorAll('.mtab').forEach(t=>{
  t.addEventListener('click',()=>{
    curM=+t.dataset.m;
    document.querySelectorAll('.mtab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    render();
  });
});
document.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',()=>{
    const f=p.dataset.f,v=p.dataset.v;
    document.querySelectorAll(`.pill[data-f="${f}"]`).forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    if(f==='prio') fPrio=v; else fStatus=v;
    renderCards();
  });
});

function renderMetrics(){
  const all=allData();
  document.getElementById('m-total').textContent=all.length;
  document.getElementById('m-conf').textContent=all.filter(d=>d.status==='일정확정').length;
  document.getElementById('m-high').textContent=all.filter(d=>d.prio==='최우선').length;
  document.getElementById('m-free').textContent=all.filter(d=>d.cost==='무료').length;
}
function renderCal(){
  const daysInMonth=curM===6?30:31;
  const startDow=new Date(2026,curM-1,1).getDay();
  document.getElementById('cal-hdr-label').textContent=`2026년 ${curM}월`;
  const byDay={};
  allData().filter(d=>d.day).forEach(d=>{if(!byDay[d.day])byDay[d.day]=[];byDay[d.day].push(d);});
  const today=new Date();
  const isCurMonth=today.getFullYear()===2026&&today.getMonth()===curM-1;
  let html='';
  ['일','월','화','수','목','금','토'].forEach(d=>{html+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<startDow;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=isCurMonth&&d===today.getDate();
    html+=`<div class="cal-cell${isToday?' today':''}"><div class="cal-day-num">${d}</div>`;
    if(byDay[d])byDay[d].forEach(ev=>{
      const t=ev.title.length>12?ev.title.slice(0,12)+'…':ev.title;
      html+=`<div class="cal-event ${EP[ev.prio]}" title="${ev.title}">${t}</div>`;
    });
    html+=`</div>`;
  }
  const rem=(startDow+daysInMonth)%7;
  if(rem>0)for(let i=0;i<7-rem;i++)html+=`<div class="cal-cell empty"></div>`;
  document.getElementById('cal-grid').innerHTML=html;
}
function renderNote(){
  const undated=allData().filter(d=>!d.day);
  document.getElementById('note-header').textContent=`날짜 미확정 행사 ${undated.length}건 — 일정 확인 후 캘린더 반영 필요`;
  document.getElementById('note-body').innerHTML=undated.map(d=>`
    <div class="cal-note-row">
      <span class="badge ${BS[d.status]}">${d.status}</span>
      <span class="badge ${BP[d.prio]}">${d.prio}</span>
      <span class="cal-note-name">${d.title}</span>
      <span class="cal-note-date">${d.date}</span>
    </div>`).join('');
}
function renderCards(){
  const list=filtered();
  document.getElementById('list-count').textContent=list.length+'건';
  if(!list.length){document.getElementById('card-list').innerHTML='<div class="empty">해당 조건의 행사가 없습니다</div>';return;}
  document.getElementById('card-list').innerHTML=list.map(d=>`
    <div class="card">
      <div class="card-top">
        <div class="card-title">${d.title}</div>
        <div class="card-badges"><span class="badge ${BS[d.status]}">${d.status}</span><span class="badge ${BP[d.prio]}">${d.prio}</span></div>
      </div>
      <div class="card-meta">
        <div class="meta-row"><span class="meta-key">일시</span><span class="meta-val">${d.date}</span></div>
        <div class="meta-row"><span class="meta-key">비용</span><span class="meta-val">${d.cost}</span></div>
        <div class="meta-row"><span class="meta-key">주관</span><span class="meta-val">${d.org}</span></div>
        <div class="meta-row"><span class="meta-key">장소</span><span class="meta-val">${d.venue}</span></div>
      </div>
      <div class="card-divider"></div>
      <div class="card-content">${d.content.split('/').map(s=>'· '+s.trim()).join('  ')}</div>
      <div class="card-speakers"><b>참석자</b> ${d.speakers}</div>
      <div class="card-source">출처: <a href="${d.url}" target="_blank" rel="noopener">${d.src} ↗</a></div>
    </div>`).join('');
}
function render(){renderMetrics();renderCal();renderNote();renderCards();}
render();
</script>
