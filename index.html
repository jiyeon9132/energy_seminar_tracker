<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에너지·전력 세미나 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #F7F8FA;
    --surface:  #FFFFFF;
    --border:   #E4E8EF;
    --text-1:   #1A2332;
    --text-2:   #4A5568;
    --text-3:   #8A96A8;
    --blue:     #2D6BE4;
    --blue-lt:  #EBF1FD;
    --green:    #1E8A4C;
    --green-lt: #E6F5ED;
    --amber:    #B45309;
    --amber-lt: #FEF3DC;
    --purple:   #6B46C1;
    --purple-lt:#F0EBFF;
    --red-lt:   #FEF0F0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text-1); }
  .header-sub { font-size: 11px; color: var(--text-3); margin-left: 8px; }
  .updated { font-size: 11px; color: var(--text-3); }

  /* ── Layout ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 24px; }

  /* ── Metrics ── */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .metric-label { font-size: 11px; color: var(--text-3); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.3px; }
  .metric-val { font-size: 26px; font-weight: 600; color: var(--text-1); font-family: 'Inter', sans-serif; }
  .metric-val.blue  { color: var(--blue); }
  .metric-val.green { color: var(--green); }

  /* ── Filters ── */
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 20px;
  }
  .filter-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
  .filter-label { font-size: 11px; color: var(--text-3); font-weight: 500; }
  .pill {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--surface);
    color: var(--text-2);
    transition: all .15s;
    font-weight: 400;
  }
  .pill:hover { border-color: var(--blue); color: var(--blue); }
  .pill.active { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 500; }

  /* ── Section title ── */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin: 28px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-count {
    font-size: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-3);
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ── Calendar ── */
  .cal-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .cal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cal-header-right { font-size: 11px; color: var(--text-3); font-weight: 400; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-dow {
    padding: 8px 4px;
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .cal-dow:first-child { color: #E53E3E; }
  .cal-dow:last-child { color: var(--blue); }
  .cal-cell {
    min-height: 80px;
    padding: 6px 5px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.empty { background: var(--bg); opacity: 0.5; }
  .cal-cell.today .cal-day-num {
    background: var(--blue);
    color: #fff;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
  }
  .cal-day-num {
    font-size: 11px;
    color: var(--text-2);
    margin-bottom: 4px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
  }
  .cal-event {
    font-size: 9.5px;
    padding: 2px 5px;
    border-radius: 4px;
    margin-bottom: 2px;
    line-height: 1.4;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ev-high { background: var(--green-lt); color: var(--green); }
  .ev-med  { background: var(--amber-lt); color: var(--amber); }
  .ev-low  { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }

  /* ── Calendar note (undated) ── */
  .cal-note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .cal-note-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-2);
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cal-note-body { padding: 4px 0; }
  .cal-note-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .cal-note-row:last-child { border-bottom: none; }
  .cal-note-name { color: var(--text-1); flex: 1; font-weight: 500; }
  .cal-note-date { color: var(--text-3); font-size: 10px; flex-shrink: 0; }

  /* ── Badges ── */
  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .b-conf   { background: var(--blue-lt);   color: var(--blue); }
  .b-plan   { background: var(--amber-lt);  color: var(--amber); }
  .b-est    { background: var(--purple-lt); color: var(--purple); }
  .b-high   { background: var(--green-lt);  color: var(--green); }
  .b-med    { background: var(--amber-lt);  color: var(--amber); }
  .b-low    { background: var(--bg);        color: var(--text-3); border: 1px solid var(--border); }

  /* ── Cards ── */
  .card-list { display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color .15s, box-shadow .15s;
  }
  .card:hover { border-color: #C0CCE0; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text-1); line-height: 1.4; }
  .card-badges { display: flex; gap: 4px; flex-shrink: 0; }
  .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 16px; margin-bottom: 8px; }
  .meta-row { display: flex; gap: 6px; font-size: 11px; }
  .meta-key { color: var(--text-3); font-weight: 500; flex-shrink: 0; width: 24px; }
  .meta-val { color: var(--text-2); }
  .card-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .card-content { font-size: 11px; color: var(--text-2); line-height: 1.7; }
  .card-speakers { font-size: 11px; color: var(--text-2); margin-top: 4px; }
  .card-speakers b { color: var(--text-1); }
  .card-source { font-size: 10px; color: var(--blue); margin-top: 6px; }

  /* ── Empty ── */
  .empty { text-align: center; padding: 40px; color: var(--text-3); font-size: 13px; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px 0 24px;
    font-size: 11px;
    color: var(--text-3);
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  .monitor-links { display: flex; gap: 16px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
  .monitor-links a { color: var(--blue); text-decoration: none; font-size: 11px; }
  .monitor-links a:hover { text-decoration: underline; }
</style>
</head>

  <!-- List -->

    행사 목록

  </div>
  <div class="card-list" id="card-list"></div>

  <footer class="footer">
    <div>개최추정 행사는 반드시 직접 확인 후 참석 결정하세요.</div>

</div>

const B_STATUS = { 일정확정:'b-conf', 일정조율중:'b-plan', 개최추정:'b-est' };
const B_PRIO   = { 최우선:'b-high', 우선:'b-med', 참고용:'b-low' };
const EV_PRIO  = { 최우선:'ev-high', 우선:'ev-med', 참고용:'ev-low' };

let fPrio = 'all', fStatus = 'all';
function filtered(){ return SEMINARS.filter(d => (fPrio==='all'||d.prio===fPrio) && (fStatus==='all'||d.status===fStatus)); }

function renderHeader(){
  document.getElementById('updated-date').textContent = '업데이트: ' + new Date().toLocaleDateString('ko-KR');
}

function renderMetrics(){
  document.getElementById('m-total').textContent = SEMINARS.length;
  document.getElementById('m-conf').textContent  = SEMINARS.filter(d=>d.status==='일정확정').length;
  document.getElementById('m-high').textContent  = SEMINARS.filter(d=>d.prio==='최우선').length;
  document.getElementById('m-free').textContent  = SEMINARS.filter(d=>d.cost==='무료').length;
}

function renderCal(){
  const DOW = ['일','월','화','수','목','금','토'];
  let html = DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  const byDay = {};
  SEMINARS.filter(d=>d.day).forEach(d=>{ if(!byDay[d.day]) byDay[d.day]=[]; byDay[d.day].push(d); });

  const startDow = new Date(2026,5,1).getDay(); // 월요일=1
  for(let i=0;i<startDow;i++) html+=`<div class="cal-cell empty"></div>`;

  const today = new Date();
  for(let d=1;d<=30;d++){
    const isToday = today.getFullYear()===2026 && today.getMonth()===5 && today.getDate()===d;
    html += `<div class="cal-cell${isToday?' today':''}"><div class="cal-day-num">${d}</div>`;
    if(byDay[d]) byDay[d].forEach(ev=>{
      html += `<div class="cal-event ${EV_PRIO[ev.prio]}" title="${ev.title}">${ev.title.slice(0,12)}…</div>`;
    });
    html += `</div>`;
  }
  const used = startDow + 30;
  const remain = used % 7;
  if(remain>0) for(let i=0;i<7-remain;i++) html+=`<div class="cal-cell empty"></div>`;

  document.getElementById('cal-grid').innerHTML = html;
}

function renderCalNote(){
  const undated = SEMINARS.filter(d=>!d.day);
  document.querySelector('.cal-note-header').textContent =
    `날짜 미확정 행사 ${undated.length}건 — 일정 확인 후 캘린더 반영 필요`;
  document.getElementById('cal-note-body').innerHTML = undated.map(d=>`
    <div class="cal-note-row">
      <span class="badge ${B_STATUS[d.status]}">${d.status}</span>
      <span class="badge ${B_PRIO[d.prio]}">${d.prio}</span>
      <span class="cal-note-name">${d.title}</span>
      <span class="cal-note-date">${d.date}</span>
    </div>`).join('');
}

function renderCards(){
  const list = filtered();
  document.getElementById('list-count').textContent = list.length + '건';
  if(!list.length){ document.getElementById('card-list').innerHTML='<div class="empty">해당 조건의 행사가 없습니다</div>'; return; }
  document.getElementById('card-list').innerHTML = list.map(d=>`
    <div class="card">
      <div class="card-top">
        <div class="card-title">${d.title}</div>
        <div class="card-badges">
          <span class="badge ${B_STATUS[d.status]}">${d.status}</span>
          <span class="badge ${B_PRIO[d.prio]}">${d.prio}</span>
        </div>
      </div>
      <div class="card-meta">
        <div class="meta-row"><span class="meta-key">일시</span><span class="meta-val">${d.date}</span></div>
        <div class="meta-row"><span class="meta-key">비용</span><span class="meta-val">${d.cost}</span></div>
        <div class="meta-row"><span class="meta-key">주관</span><span class="meta-val">${d.org}</span></div>
        <div class="meta-row"><span class="meta-key">장소</span><span class="meta-val">${d.venue}</span></div>
      </div>
      <div class="card-divider"></div>
      <div class="card-content">${d.content.split('/').map(s=>'· '+s.trim()).join('  ')}</div>
      <div class="card-speakers"><b>참석자</b> ${d.speakers}</div>
      <div class="card-source">출처: ${d.src}</div>
    </div>`).join('');
}

document.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',()=>{
    const f=p.dataset.f, v=p.dataset.v;
    document.querySelectorAll(`.pill[data-f="${f}"]`).forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    if(f==='prio') fPrio=v; else fStatus=v;
    renderCards();
  });
});

renderHeader();
renderMetrics();
renderCal();
renderCalNote();
renderCards();
</script>
